<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scharf geschätzt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e1f;
    --bg2:#141a35;
    --gold:#ffce3a;
    --red:#ff3b4e;
    --silver:#7fd4ff;
    --bronze:#ff944d;
    --ink:#f5f7ff;
    --dim:#8a93b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Barlow Semi Condensed',sans-serif;
    background:
      radial-gradient(circle at 50% -10%, #2a3470 0%, transparent 60%),
      radial-gradient(ellipse at 50% 0%, #1d2547 0%, var(--bg) 55%);
    background-color:var(--bg);
    color:var(--ink);
    min-height:100%;
    overflow-x:hidden;
  }
  /* stage spotlight */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 70% 50% at 50% 8%, rgba(255,206,58,.12), transparent 70%);
    z-index:0;
  }
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:22px 18px 60px;}

  h1{
    font-family:'Anton',sans-serif;
    font-size:clamp(34px,11vw,56px);
    line-height:.92;
    text-transform:uppercase;
    letter-spacing:1px;
    text-align:center;
    background:linear-gradient(180deg,#fff 0%,var(--gold) 70%,#c98a00 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 0 rgba(0,0,0,.45));
  }
  .sub{text-align:center;color:var(--dim);font-weight:600;letter-spacing:3px;text-transform:uppercase;font-size:13px;margin-top:6px;}

  .card{
    background:linear-gradient(160deg,var(--bg2),#0c1126);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:20px;
    margin-top:22px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.05);
  }

  label.lbl{display:block;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;font-size:13px;color:var(--dim);margin-bottom:10px;}

  .drop{
    border:2px dashed rgba(255,206,58,.35);
    border-radius:14px;padding:30px 18px;text-align:center;cursor:pointer;
    transition:.2s;background:rgba(255,206,58,.04);
  }
  .drop:active{transform:scale(.99);}
  .drop strong{display:block;font-family:'Anton';font-size:22px;color:var(--gold);letter-spacing:.5px;}
  .drop span{color:var(--dim);font-size:14px;}
  input[type=file]{display:none;}

  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
  .thumbs .t{position:relative;width:60px;height:60px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.12);}
  .thumbs .t img{width:100%;height:100%;object-fit:cover;}
  .thumbs .t b{position:absolute;top:0;left:0;background:var(--red);color:#fff;font-size:11px;padding:1px 5px;border-bottom-right-radius:8px;font-weight:700;}

  .row{display:flex;align-items:center;gap:14px;margin-top:18px;}
  .row .lbl{margin:0;flex:1;}
  input[type=range]{flex:1;accent-color:var(--gold);}
  .secval{font-family:'Anton';font-size:20px;color:var(--gold);min-width:54px;text-align:right;}

  button{
    font-family:'Anton',sans-serif;letter-spacing:1px;text-transform:uppercase;
    border:none;border-radius:14px;cursor:pointer;color:#0a0e1f;
    padding:16px;font-size:20px;width:100%;transition:transform .08s, filter .15s;
  }
  button:active{transform:translateY(2px) scale(.99);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .btn-go{background:linear-gradient(180deg,var(--gold),#e0a400);box-shadow:0 8px 0 #8a6400;margin-top:22px;}
  .btn-go:active{box-shadow:0 4px 0 #8a6400;}

  /* GAME */
  #game{display:none;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .pill{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:7px 14px;font-weight:700;letter-spacing:1px;font-size:13px;text-transform:uppercase;color:var(--dim);}
  .pill b{color:var(--gold);font-family:'Anton';font-size:18px;margin-left:4px;}

  .stage{
    position:relative;border-radius:16px;overflow:hidden;
    background:#000;aspect-ratio:4/3;
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 0 0 4px rgba(255,206,58,.08), 0 25px 50px -20px rgba(0,0,0,.8);
  }
  .stage img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    transform:scale(1.12);will-change:filter;
  }
  .stage .frame{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 60px rgba(0,0,0,.55);border-radius:16px;}

  /* progress beam */
  .beam-wrap{margin-top:18px;}
  .beam{position:relative;height:26px;border-radius:8px;overflow:hidden;display:flex;border:1px solid rgba(255,255,255,.12);}
  .beam .z{height:100%;display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:14px;color:rgba(0,0,0,.55);}
  .z1{width:25%;background:linear-gradient(180deg,#ffe07a,var(--gold));}
  .z2{width:50%;background:linear-gradient(180deg,#a9e3ff,var(--silver));}
  .z3{width:25%;background:linear-gradient(180deg,#ffb37a,var(--bronze));}
  .marker{position:absolute;top:-5px;bottom:-5px;width:4px;background:var(--red);left:0;border-radius:3px;box-shadow:0 0 10px var(--red);transition:none;}
  .marker::after{content:"";position:absolute;top:-7px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--red);}
  .beam-leg{display:flex;justify-content:space-between;margin-top:6px;color:var(--dim);font-size:12px;font-weight:600;letter-spacing:1px;}

  .controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px;}
  .controls .full{grid-column:1 / -1;}
  .btn-start{background:linear-gradient(180deg,#7fffa8,#22c55e);box-shadow:0 6px 0 #157f37;}
  .btn-pause{background:linear-gradient(180deg,#ffe07a,var(--gold));box-shadow:0 6px 0 #8a6400;}
  .btn-right{background:linear-gradient(180deg,#7fffa8,#22c55e);box-shadow:0 6px 0 #157f37;}
  .btn-wrong{background:linear-gradient(180deg,#ff8a96,var(--red));color:#fff;box-shadow:0 6px 0 #a00d1d;}
  .btn-next{background:linear-gradient(180deg,#a9e3ff,var(--silver));box-shadow:0 6px 0 #1f6f99;}
  .hide{display:none!important;}

  .award{text-align:center;margin-top:16px;font-family:'Anton';font-size:26px;color:var(--gold);min-height:32px;letter-spacing:1px;}
  .award.flash{animation:pop .5s ease;}
  @keyframes pop{0%{transform:scale(.5);opacity:0;}60%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}

  .endcard{text-align:center;}
  .endcard .big{font-family:'Anton';font-size:60px;color:var(--gold);line-height:1;}
  .scorelist{margin-top:16px;text-align:left;}
  .scorelist div{display:flex;justify-content:space-between;padding:8px 4px;border-bottom:1px solid rgba(255,255,255,.07);font-weight:600;}
  .scorelist div b{color:var(--gold);font-family:'Anton';}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== UPLOAD ===== -->
  <div id="setup">
    <h1>Scharf<br>geschätzt</h1>
    <div class="sub">Schlag den Raab &middot; Eigenbau</div>

    <div class="card">
      <label class="lbl">Bilder hochladen</label>
      <div class="drop" id="drop">
        <strong>+ Bilder wählen</strong>
        <span>Mehrere auf einmal — werden nacheinander gespielt</span>
      </div>
      <input type="file" id="file" accept="image/*" multiple>
      <div class="thumbs" id="thumbs"></div>

      <div class="row">
        <label class="lbl">Dauer pro Bild</label>
        <input type="range" id="dur" min="4" max="30" value="12" step="1">
        <div class="secval"><span id="durv">12</span>s</div>
      </div>
      <div class="row">
        <label class="lbl">Start-Unschärfe</label>
        <input type="range" id="blur" min="10" max="60" value="34" step="2">
        <div class="secval"><span id="blurv">34</span>px</div>
      </div>

      <button class="btn-go" id="startGame" disabled>Spiel starten</button>
    </div>
  </div>

  <!-- ===== GAME ===== -->
  <div id="game">
    <div class="topbar">
      <div class="pill">Bild <b id="idx">1</b>/<span id="total">1</span></div>
      <div class="pill">Punkte<b id="score">0</b></div>
    </div>

    <div class="stage">
      <img id="stageImg" alt="">
      <div class="frame"></div>
    </div>

    <div class="beam-wrap">
      <div class="beam">
        <div class="z z1">3 P</div>
        <div class="z z2">2 P</div>
        <div class="z z3">1 P</div>
        <div class="marker" id="marker"></div>
      </div>
      <div class="beam-leg"><span>unscharf</span><span>scharf →</span></div>
    </div>

    <div class="award" id="award"></div>

    <div class="controls">
      <button class="btn-start full" id="bStart">Start</button>
      <button class="btn-pause full hide" id="bPause">Pause</button>

      <button class="btn-right hide" id="bRight">Richtig ✓</button>
      <button class="btn-wrong hide" id="bWrong">Falsch ✗</button>

      <button class="btn-next full hide" id="bNext">Nächstes Bild →</button>
    </div>
  </div>

  <!-- ===== END ===== -->
  <div id="end" class="card endcard hide">
    <div class="sub">Endstand</div>
    <div class="big" id="finalScore">0</div>
    <div class="scorelist" id="scoreList"></div>
    <button class="btn-go" id="again">Nochmal spielen</button>
  </div>

</div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  // ---- Setup refs ----
  const drop=$('drop'), file=$('file'), thumbs=$('thumbs'), startGame=$('startGame');
  const dur=$('dur'), durv=$('durv'), blur=$('blur'), blurv=$('blurv');
  const setup=$('setup'), game=$('game'), end=$('end');

  // ---- Game refs ----
  const stageImg=$('stageImg'), marker=$('marker'), award=$('award');
  const idxEl=$('idx'), totalEl=$('total'), scoreEl=$('score');
  const bStart=$('bStart'), bPause=$('bPause'), bRight=$('bRight'), bWrong=$('bWrong'), bNext=$('bNext');

  let images=[];           // {url,name}
  let current=0;
  let score=0;
  let results=[];          // points per image
  let maxBlur=34, duration=12000;

  // animation state
  let progress=0;          // 0..1 (sharpness)
  let raf=null, lastT=0, running=false, decided=false;

  // ---------- Setup ----------
  dur.oninput=()=>{durv.textContent=dur.value;};
  blur.oninput=()=>{blurv.textContent=blur.value;};
  drop.onclick=()=>file.click();
  file.onchange=e=>{
    const files=[...e.target.files].filter(f=>f.type.startsWith('image/'));
    let pending=files.length;
    if(!pending)return;
    files.forEach(f=>{
      const r=new FileReader();
      r.onload=()=>{
        images.push({url:r.result,name:f.name});
        if(--pending===0) renderThumbs();
      };
      r.onerror=()=>{ if(--pending===0) renderThumbs(); };
      r.readAsDataURL(f);
    });
  };
  function renderThumbs(){
    thumbs.innerHTML='';
    images.forEach((im,i)=>{
      const d=document.createElement('div');d.className='t';
      d.innerHTML='<b>'+(i+1)+'</b><img src="'+im.url+'">';
      thumbs.appendChild(d);
    });
    startGame.disabled=images.length===0;
    startGame.textContent= images.length? 'Spiel starten ('+images.length+' Bilder)' : 'Spiel starten';
  }

  startGame.onclick=()=>{
    maxBlur=+blur.value;
    duration=+dur.value*1000;
    current=0;score=0;results=[];
    scoreEl.textContent='0';
    totalEl.textContent=images.length;
    setup.style.display='none';
    game.style.display='block';
    loadImage();
  };

  // ---------- Game ----------
  function loadImage(){
    decided=false;running=false;progress=0;
    cancelAnimationFrame(raf);
    idxEl.textContent=current+1;
    stageImg.src=images[current].url;
    setBlur(0);
    setMarker(0);
    award.textContent='';award.classList.remove('flash');
    // buttons -> only Start
    show(bStart,true); show(bPause,false);
    show(bRight,false); show(bWrong,false); show(bNext,false);
  }

  function setBlur(p){ // p = sharpness 0..1
    // perzeptuell gleichmäßig: Unschärfe exponentiell abbauen
    const floor=0.4;
    let b = p>=1 ? 0 : maxBlur*Math.pow(floor/maxBlur, p);
    stageImg.style.filter='blur('+b.toFixed(2)+'px)';
  }
  function setMarker(p){ marker.style.left=(p*100)+'%'; }

  function pointsFor(p){
    if(p<=0.25) return 3;
    if(p<=0.75) return 2;
    return 1;
  }

  function tick(t){
    if(!lastT)lastT=t;
    const dt=t-lastT;lastT=t;
    progress+=dt/duration;
    if(progress>=1){progress=1;}
    setBlur(progress);setMarker(progress);
    if(progress>=1){ running=false; autoReveal(); return; }
    if(running) raf=requestAnimationFrame(tick);
  }

  function play(){
    running=true;lastT=0;
    raf=requestAnimationFrame(tick);
    show(bStart,false); show(bPause,true);
    show(bRight,false); show(bWrong,false);
  }

  function pause(){
    running=false;cancelAnimationFrame(raf);
    show(bPause,false);
    show(bRight,true); show(bWrong,true);
  }

  bStart.onclick=play;
  bPause.onclick=pause;

  // continue after a wrong guess
  bWrong.onclick=()=>{
    show(bRight,false); show(bWrong,false);
    play();
  };

  // correct guess -> reveal sharp + award points at current progress
  bRight.onclick=()=>{
    const pts=pointsFor(progress);
    finishImage(pts);
  };

  // image fully sharpened without a correct guess -> 0 points unless they act
  function autoReveal(){
    show(bPause,false);
    setBlur(1);setMarker(1);
    // they reached full sharpness: still let them mark right(1P)/wrong(0)
    show(bRight,true); show(bWrong,true);
    bWrong.onclick=()=>{ finishImage(0); };
  }

  function finishImage(pts){
    decided=true;running=false;cancelAnimationFrame(raf);
    setBlur(1);setMarker(progress<1?progress:1);
    score+=pts;results.push({name:images[current].name,pts});
    scoreEl.textContent=score;
    award.textContent= pts>0 ? '+'+pts+' Punkt'+(pts>1?'e':'') : 'Kein Punkt';
    award.classList.remove('flash');void award.offsetWidth;award.classList.add('flash');
    show(bStart,false);show(bPause,false);show(bRight,false);show(bWrong,false);
    show(bNext,true);
    // reset wrong handler for next round
    bWrong.onclick=()=>{ show(bRight,false); show(bWrong,false); play(); };
  }

  bNext.onclick=()=>{
    current++;
    if(current>=images.length){ showEnd(); }
    else loadImage();
  };

  function showEnd(){
    game.style.display='none';
    end.classList.remove('hide');
    $('finalScore').textContent=score;
    const list=$('scoreList');list.innerHTML='';
    results.forEach((r,i)=>{
      const d=document.createElement('div');
      d.innerHTML='<span>'+(i+1)+'. '+(r.name||'Bild '+(i+1))+'</span><b>'+r.pts+' P</b>';
      list.appendChild(d);
    });
  }

  $('again').onclick=()=>{
    end.classList.add('hide');
    setup.style.display='block';
    // keep uploaded images, reset thumbs view
    renderThumbs();
  };

  function show(el,on){ el.classList.toggle('hide',!on); }
})();
</script>
</body>
</html>
